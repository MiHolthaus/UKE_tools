<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Labororganisation</title>
  <style>
    :root { --border:#80b7ee; --muted:#353d46; --bg:#ffffff; --card:#86caf1; }
    body { margin:0; font:16px/1.4 system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; background:var(--bg); color:#111; }
    .wrap { max-width:900px; margin:0 auto; padding:16px; }
    header { display:flex; gap:12px; align-items:center; justify-content:space-between; margin-bottom:16px; }
    h1 { font-size:18px; margin:0; }
    .toolbar { display:flex; gap:8px; align-items:center; }
    button, .btn {
      border:1px solid var(--border); background:#fff; padding:8px 10px; border-radius:10px;
      cursor:pointer; font:inherit;
    }
    button:hover { background:#f3f4f6; }
    .lang { display:flex; gap:6px; }
    .lang button[aria-pressed="true"] { background:#111; color:#fff; border-color:#111; }
    .card { border:1px solid var(--border); border-radius:14px; padding:14px; background:#fff; margin-bottom:12px; }
    .qtitle { font-weight:600; margin:0 0 10px 0; }
    .opts { display:flex; flex-wrap:wrap; gap:8px; }
    .opt { border:1px solid var(--border); border-radius:999px; padding:8px 12px; background:#fff; }
    .opt[aria-pressed="true"] { background:#111; color:#fff; border-color:#111; }
    .muted { color:var(--muted); font-size:13px; }
    .result { background:var(--card); border:1px solid var(--border); border-radius:14px; padding:14px; }
    .result h2 { font-size:16px; margin:0 0 8px 0; }
    .solution { padding:10px 12px; border-radius:12px; border:1px solid var(--border); background:#fff; font-weight:600; }
    .path { margin-top:10px; }
    .path ul { margin:6px 0 0 18px; }
    @media print {
      .no-print { display:none !important; }
      body { background:#fff; }
      .wrap { max-width:none; padding:0; }
      .card { break-inside:avoid; }
    }
  </style>
</head>

<body>
  <div class="wrap">
    <header>
      <h1 id="appTitle">Labororganisation V1.0</h1>  <!-- Hier ist die echte Ueberschrift! -->
      <div class="toolbar no-print">
        <div class="lang" aria-label="Sprache">
          <button id="btnDE" aria-pressed="true">DE</button>
          <button id="btnEN" aria-pressed="false">EN</button>
        </div>
        <button id="btnReset">Neu starten</button>
        <button id="btnPrint" onclick="window.print()">Drucken / PDF</button>
      </div>
    </header>

    <main id="app"></main>

    <section id="result" class="result" hidden>
      <h2 id="resultTitle">Ergebnis</h2>
      <div class="solution" id="solutionText">—</div>
      <div class="path">
        <div class="muted" id="pathTitle">Entscheidungsweg</div>
        <ul id="pathList"></ul>
      </div>
    </section>

    
    <script>
      // ====== EDITIERBLOCK START ======
      const MODEL = {

        nodes: [
          {

              { value: "contaminated_liq", label: { de: "Kontaminiertes Laborgeschirr, Flaschen oder Flüssigbafälle inaktivieren lassen", 
              en: "Have contaminated labware, bottles, or liquid waste inactivated" }, nextId: "result_liq" },
              { value: "contaminated_solid", label: { de: "Kontaminierte Festabfälle oder Agarschalen inaktivieren lassen", 
              en: "Have contaminated solid waste or agar plates inactivated" }, nextId: "result_solid" },
              { value: "contaminated_sharp", label: { de: "Kontaminierte scharfkantige Abfälle inaktivieren lassen", 
              en: "Have contaminated, sharp-edged waste inactivated" }, nextId: "result_sharp" },
              { value: "wash", label: { de: "Laborgeschirr reinigen lassen", en: "Have labware cleaned" }, nextId: "result_wash" }
            ]
          },
          
          // ===== Ergebnis-Knoten =====
{
  id: "result_solid",
  image: "pic/lab_solid_web.png",
  image_mobile: "pic/lab_solid_mobile.png",
text: {

  </li>

  <li>Der KSE muss bei der Unterweisung gezeigt werden, wo der Abfall gesammelt wird.</li>
</ul>
`,
    en: `
    <h3>Set up in the lab</h3>
<ul>
  <li>Autoclave bags (laboratories must supply their own contents)</li>
  <ul>
    <li>CS-Anforderungssystem - Labor</li>
      <ul>

  </li>
  <li>Place it in a location that is clearly visible and clearly labeled so that the KSE can access it.</li>
  <li>During the instruction, the KSE must be shown where the waste is collected.</li>
</ul>
`
 },
  options: []
},
{
  id: "result_sharp",
  image: "pic/lab_sharp_web.png",
  image_mobile: "pic/lab_sharp_mobile.png",
  text: {
    de: `
    <h3>Im Labor bereitstellen</h3>
<ul>
  <li>Eine Kanülenbox wird in der Wanne mit Flüssigabfall bereitgestellt.</li>
  <li>Siehe Flüssigabfall</a></li>
</ul>
`,
    en: `
    <h3>Set up in the lab</h3>
<ul>
  <li>A needle box is placed in the tub with the liquid waste.</li>
  <li>See Liquid Waste</li>
</ul>
`
 },
  options: []
},
{
  id: "result_media",
  image: "pic/lab_media_web.png",
  image_mobile: "pic/lab_media_mobile.png",
  text: {
    de: `
    <h3>Im Labor bereitstellen</h3>
<ul>
  <li>Keine Änderungen im Labor nötig!</li>

</ul>
`,
    en: `
    <h3>Set up in the lab</h3>
<ul>
  <li>No changes are needed in the lab!</li>
  <li>Prepare the media, etc., using the <a href="Entscheidungshilfe.html" target="_blank" rel="noopener">Decision Helper</a>, and bring them to the scullery.</li>
</ul>
`
 },
  options: []
},
{
  id: "result_liq",
  image: "pic/lab_liquid_web.png",
  image_mobile: "pic/lab_liquid_mobile.png",
text: {
    de: `
    <h3>Im Labor bereitstellen</h3>
<ul>
  <li>Wanne mit eindeutiger Kennzeichnung "Flüssigmüll": <a href="pic/liq_waste_rot.png" download>Flüssigmüll-Druckvorlage herunterladen</a> </li>

  <li>Gut sichtbar und eindeutig beschriftet für die KSE zugänglich aufstellen.</li>
  <li>Der KSE muss bei der Unterweisung gezeigt werden, wo der Abfall gesammelt wird.</li>
</ul>
`,
    en: `
    <h3>Set up in the lab</h3>
<ul>
  <li>Tray clearly labeled “Liquid Waste”: <a href="pic/liq_waste_rot.png" download>Download Liquid Waste Print Template</a></li>

  <li>During the instruction, the KSE must be shown where the waste is collected.</li>
</ul>
`
 },
  options: []
},
{
  id: "result_wash",
  image: "pic/lab_wash_web.png",
  image_mobile: "pic/lab_wash_mobile.png",
  text: {
    de: `
    <h3>Im Labor bereitstellen</h3>
<ul>
  <li>Wanne mit eindeutiger Kennzeichnung "Nur Spülgut": <a href="pic/spuelgut.png" download>Spülgut-Vorlage herunterladen</a> </li>
  <li>Die Wanne muss deutlich von der mit Flüssigmüll zu unterscheiden sein.</li>
  <li>Gut sichtbar und eindeutig beschriftet für die KSE zugänglich aufstellen.</li>
  <li>Der KSE muss bei der Unterweisung gezeigt werden, wo der Abfall gesammelt wird.</li>
</ul>
`,
    en: `
    <h3>Set up in the lab</h3>
<ul>
  <li>Tray clearly labeled “Dishwashing items only”: <a href="pic/spuelgut.png" download>Download Dishwashing Print Template</a></li>
  <li>The tray must be clearly distinguishable from the one containing liquid waste.</li>
  <li>Place it in a location that is clearly visible and clearly labeled so that the KSE can access it.</li>
  <li>During the instruction, the KSE must be shown where the waste is collected.</li>
</ul>
`
  },
  options: []
}


          
          
          
        ],
        
        
        
      };
      // ====== EDITIERBLOCK ENDE ======

      // ====== App-Logik ======
      const appEl = document.getElementById("app");
      const resultEl = document.getElementById("result");
      const solutionEl = document.getElementById("solutionText");
      const pathListEl = document.getElementById("pathList");

      const btnDE = document.getElementById("btnDE");
      const btnEN = document.getElementById("btnEN");
      const btnReset = document.getElementById("btnReset");

      let lang = "de";
      let answers = []; // [{nodeId, optionValue}]
      let visibleNodeIds = []; // Reihenfolge der angezeigten Fragen

      const nodeById = (id) => MODEL.nodes.find(n => n.id === id);

      function t(obj) { return obj?.[lang] ?? ""; }

      function setLang(newLang) {
        lang = newLang;
        btnDE.setAttribute("aria-pressed", String(lang === "de"));
        btnEN.setAttribute("aria-pressed", String(lang === "en"));
        document.documentElement.lang = lang;
        document.getElementById("appTitle").textContent = (lang === "de") ? "Entscheidungshilfe" : "Decision Helper";
        document.getElementById("resultTitle").textContent = (lang === "de") ? "Ergebnis" : "Result";
        document.getElementById("pathTitle").textContent = (lang === "de") ? "Entscheidungsweg" : "Decision path";
        btnReset.textContent = (lang === "de") ? "Neu starten" : "Restart";
        render();
      }

      function reset() {
        answers = [];
        visibleNodeIds = [MODEL.startId];
        resultEl.hidden = true;
        render();
      }

      function getAnswer(nodeId) {
        return answers.find(a => a.nodeId === nodeId)?.optionValue ?? null;
      }

      function setAnswer(nodeId, optionValue) {
        // answers bis nodeId behalten, alles danach löschen (weil Pfad sich ändern kann)
        const idx = visibleNodeIds.indexOf(nodeId);
        visibleNodeIds = visibleNodeIds.slice(0, idx + 1);

        answers = answers.filter(a => visibleNodeIds.includes(a.nodeId));
        answers = answers.filter(a => a.nodeId !== nodeId);
        answers.push({ nodeId, optionValue });

        // nächsten Knoten hinzufügen
        const node = nodeById(nodeId);
        const opt = node.options.find(o => o.value === optionValue);
        if (opt?.nextId && opt.nextId !== "END") {
          visibleNodeIds.push(opt.nextId);
          resultEl.hidden = true;
        } else {
          // Ende erreicht
          resultEl.hidden = false;
        }
        render();
      }

      function renderQuestion(nodeId) {
        const node = nodeById(nodeId);
        if (!node) return;

        const selected = getAnswer(nodeId);

        const card = document.createElement("section");
        card.className = "card";
        card.setAttribute("data-node", nodeId);

        const title = document.createElement("div");
        title.className = "qtitle";
        title.textContent = t(node.text);
        card.appendChild(title);

        const opts = document.createElement("div");
        opts.className = "opts";

        node.options.forEach(o => {
          const b = document.createElement("button");
          b.className = "opt";
          b.type = "button";
          b.textContent = t(o.label);
          b.setAttribute("aria-pressed", String(selected === o.value));
          b.addEventListener("click", () => setAnswer(nodeId, o.value));
          opts.appendChild(b);
        });

        card.appendChild(opts);

        const hint = document.createElement("div");
        hint.className = "muted";
        hint.style.marginTop = "10px";
        hint.textContent = (lang === "de")
          ? "Klicke eine Option. Die nächste Frage erscheint darunter."
          : "Click an option. The next question will appear below.";
        card.appendChild(hint);

        appEl.appendChild(card);
      }

      function renderResult() {
        if (resultEl.hidden) return;
        const node = nodeById(visibleNodeIds[visibleNodeIds.length - 1]);
  if (!node) return;

solutionEl.innerHTML =
  (node.image && typeof node.image === "string"
    ? `<img src="${window.innerWidth < 700 ? node.image_mobile : node.image}" alt="" style="max-width:100%;margin-bottom:12px;">`
    : "")
  + (node.text?.[lang] ?? "");


        // Entscheidungsweg
        pathListEl.innerHTML = "";
        visibleNodeIds.forEach(nodeId => {
          const node = nodeById(nodeId);
          const val = getAnswer(nodeId);
          if (!node || !val) return;
          const opt = node.options.find(o => o.value === val);
          const li = document.createElement("li");
          li.textContent = `${t(node.text)} → ${t(opt.label)}`;
          pathListEl.appendChild(li);
        });
      }

function render() {
  appEl.innerHTML = "";

  visibleNodeIds.forEach(id => {
    const node = nodeById(id);
    if (!node) return;

    // Nur Fragen rendern (Ergebnisse haben keine Optionen)
    if (node.options && node.options.length > 0) {
      renderQuestion(id);
    } else {
      // Ergebnis erreicht
      resultEl.hidden = false;
    }
  });

  renderResult();
}


      btnDE.addEventListener("click", () => setLang("de"));
      btnEN.addEventListener("click", () => setLang("en"));
      btnReset.addEventListener("click", reset);

      // init
      reset();
    </script>
  </div>
</body>
</html>
